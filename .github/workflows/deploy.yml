name: Deploy TLPP Docs

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [rest-samples-updated, doc-generate-updated, probat-samples-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Checkout satellite repositories (repos.config.json)
        run: node scripts/ci-checkout-deps.mjs

      - run: npm ci

      - name: Block AI/context files from deploy
        run: npm run audit:remote

      - name: Sync docs and generate sidebars
        run: npm run prepare:docs

      - name: Build Docusaurus
        run: |
          set -a
          eval "$(node scripts/ci-env.mjs)"
          set +a
          npm run build

      - name: Normalize artifact permissions
        run: |
          find build -type d -exec chmod 755 {} +
          find build -type f -exec chmod 644 {} +

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
